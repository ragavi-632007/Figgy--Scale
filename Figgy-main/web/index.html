<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="figgy_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>figgy_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    window.openRazorpayCheckout = function (options) {
      return new Promise(function (resolve, reject) {
        try {
          if (!window.Razorpay) {
            reject("Razorpay checkout.js not loaded");
            return;
          }
          var checkoutOptions = Object.assign({}, options || {});
          checkoutOptions.handler = function (response) {
            resolve(response || {});
          };
          checkoutOptions.modal = Object.assign({}, checkoutOptions.modal || {}, {
            ondismiss: function () {
              reject("Checkout dismissed");
            }
          });
          var rzp = new Razorpay(checkoutOptions);
          rzp.open();
        } catch (e) {
          reject(e && e.message ? e.message : String(e));
        }
      });
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
